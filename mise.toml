[tools]
caddy = "2"
# chromium = "latest"

[tasks.install-test-deps]
dir = "tests"
sources = ["package.json"]
outputs = { auto = true }
run = "npm install --silent"

[tasks.test-unit]
dir = "tests"
depends = ["install-test-deps"]
run = "node --test unit/*.test.mjs"

[tasks.test-integration]
dir = "tests"
depends = ["install-test-deps"]
run = """
cd .. && caddy run &
CADDY_PID=$!
sleep 2
node --test --test-concurrency=1 integration/*.test.mjs
EXIT_CODE=$?
kill $CADDY_PID 2>/dev/null
exit $EXIT_CODE
"""

[tasks.test]
depends = ["test-unit", "test-integration"]

[tasks.pdf]
run = """
# Start Caddy static file server (serves repo root on :8080)
caddy file-server --listen :8080 &
CADDY_PID=$!

# Wait for server to start, then run headless Chromium
sleep 2
chromium --headless --disable-gpu --print-to-pdf=cv.pdf --no-sandbox "http://localhost:8080/full?view=print"

# Kill Caddy after PDF generation
kill $CADDY_PID
"""
